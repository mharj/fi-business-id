name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write # Required for OIDC
  contents: read

env:
  # Setting an environment variable with the value of a configuration variable
  PUBLISH_BRANCH: "refs/heads/main"
  PACKAGE_NAME: "unknown"
  PACKAGE_VERSION: "unknown"
  PACKAGE_MANAGER: "npm"
  NPM_VERSION: "unknown"
  HAVE_VALIDATE_SCRIPT: false
  HAVE_LINT_SCRIPT: false
  HAVE_TEST_SCRIPT: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: luolapeikko/github-actions/read-package-info@v0
      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19 # v4
        if: env.PACKAGE_MANAGER == 'pnpm'
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: ${{ env.PACKAGE_MANAGER }} install

      - name: Run validate
        if: env.HAVE_VALIDATE_SCRIPT == 'true'
        run: ${{ env.PACKAGE_MANAGER }} run validate

      - name: Run linter checks
        if: env.HAVE_LINT_SCRIPT == 'true'
        run: ${{ env.PACKAGE_MANAGER }} run lint --reporter=github

      - name: Run unit tests and code coverage
        if: env.HAVE_TEST_SCRIPT == 'true'
        run: ${{ env.PACKAGE_MANAGER }} test

      - name: Run and publish code coverage
        if: |
          github.ref == env.PUBLISH_BRANCH &&
          env.HAVE_TEST_SCRIPT == 'true'
        uses: qltysh/qlty-action/coverage@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1
        with:
          oidc: true
          files: coverage/lcov.info

      # npm publish when PR done
      - name: Publish ${{env.PACKAGE_NAME}} ${{env.PACKAGE_VERSION}}
        run: npm publish --no-git-checks --access public
        if: |
          github.ref == env.PUBLISH_BRANCH &&
          env.PACKAGE_VERSION != env.NPM_VERSION
